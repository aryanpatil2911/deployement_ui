<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linedata | Releases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #e2e8f0; }
        .card { background: #1e2937; border: 1px solid #334155; }
        .modal { background: rgba(0,0,0,0.85); }
        textarea { font-family: monospace; background: #0f172a; color: #34d399; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center border-b border-slate-700 pb-6 mb-8">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-diagram-project text-red-500 text-3xl"></i>
                <h1 class="text-3xl font-bold">LINEDATA RELEASES</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="px-5 py-2 border border-slate-600 rounded-lg hover:bg-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-list-check"></i> Dashboard
                </a>
                <button onclick="showCreateModal()" class="px-5 py-2 bg-red-600 hover:bg-red-700 rounded-lg flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> New Release
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex gap-4 mb-8 bg-slate-900 p-4 rounded-xl border border-slate-700">
            <select id="appFilter" onchange="filterReleases()" class="bg-slate-800 border border-slate-600 px-4 py-2 rounded-lg flex-1">
                <option value="">All Applications</option>
            </select>
            <input id="search" type="text" placeholder="Search..." onkeyup="filterReleases()" class="bg-slate-800 border border-slate-600 px-4 py-2 rounded-lg flex-1">
            <button onclick="clearFilters()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg">Clear</button>
        </div>

        <!-- Grid -->
        <div id="releasesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- Modals -->
    <div id="releaseModal" class="modal fixed inset-0 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-600 rounded-xl w-full max-w-3xl mx-4 max-h-[85vh] flex flex-col">
            <div class="p-5 border-b border-slate-700 flex justify-between items-center">
                <h2 id="modalTitle" class="font-bold text-xl">Release Details</h2>
                <button onclick="closeReleaseModal()" class="text-3xl text-slate-400 hover:text-white">×</button>
            </div>
            <div id="modalContent" class="p-6 overflow-auto flex-1 font-mono text-sm bg-slate-950"></div>
            <div class="p-4 border-t border-slate-700 text-right">
                <button onclick="closeReleaseModal()" class="px-8 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg">Close</button>
            </div>
        </div>
    </div>

    <!-- Create / Edit Modal -->
    <div id="createModal" class="modal fixed inset-0 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-600 rounded-xl w-full max-w-2xl mx-4 max-h-[85vh] flex flex-col">
            <div class="p-5 border-b border-slate-700 flex justify-between">
                <h2 id="createModalTitle" class="font-bold">Create New Release</h2>
                <button onclick="closeCreateModal()" class="text-3xl text-slate-400">×</button>
            </div>
            <div class="p-6 space-y-4 flex-1 overflow-auto">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs block mb-1">Application</label>
                        <select id="newApp" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg">
                            <option value="APP_ALPHA">APP_ALPHA</option>
                            <option value="APP_BETA">APP_BETA</option>
                            <option value="APP_GAMMA">APP_GAMMA</option>
                            <option value="APP_DELTA">APP_DELTA</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs block mb-1">Version</label>
                        <input id="newVersion" type="text" placeholder="2.4.0" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="text-xs block mb-1">Environment</label>
                    <select id="newEnv" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg">
                        <option value="UAT">UAT</option>
                        <option value="PROD">PROD</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs block mb-1">Changes (one per line)</label>
                    <textarea id="newChanges" rows="5" placeholder="- Added new feature" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-slate-700 flex gap-3 justify-end">
                <button onclick="closeCreateModal()" class="px-6 py-2 border border-slate-600 rounded-lg">Cancel</button>
                <button onclick="generateAndShowYAML()" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg">Generate YAML</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal fixed inset-0 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-600 rounded-xl w-full max-w-4xl mx-4 h-[85vh] flex flex-col">
            <div class="p-5 border-b border-slate-700 flex justify-between">
                <h2 id="editModalTitle" class="font-bold">Edit Release</h2>
                <button onclick="closeEditModal()" class="text-3xl text-slate-400">×</button>
            </div>
            <div class="flex-1 p-4">
                <textarea id="editTextarea" class="w-full h-full bg-slate-950 border border-slate-700 p-4 font-mono text-sm text-emerald-300 resize-none"></textarea>
            </div>
            <div class="p-4 border-t border-slate-700 flex gap-3 justify-end">
                <button onclick="closeEditModal()" class="px-6 py-2 border border-slate-600 rounded-lg">Cancel</button>
                <button onclick="saveEditedYAML()" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="yamlPreviewModal" class="modal fixed inset-0 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-600 rounded-xl w-full max-w-3xl mx-4 max-h-[85vh] flex flex-col">
            <div class="p-5 border-b border-slate-700 flex justify-between">
                <h2 class="font-bold">Generated YAML</h2>
                <button onclick="closeYamlPreview()" class="text-3xl text-slate-400">×</button>
            </div>
            <div class="flex-1 p-6 overflow-auto">
                <pre id="yamlContent" class="text-emerald-300 font-mono text-xs whitespace-pre-wrap"></pre>
            </div>
            <div class="p-4 border-t border-slate-700 flex gap-3 justify-end">
                <button onclick="copyYAML()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg">Copy</button>
                <a id="githubCreateLink" href="#" target="_blank" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg">Update on GitHub</a>
                <button onclick="closeYamlPreview()" class="px-6 py-2 border border-slate-600 rounded-lg">Close</button>
            </div>
        </div>
    </div>

    <script>
        let allReleases = [];
        let currentEditPath = null;

        function getAppFolder(fullPath) {
            const parts = fullPath.split('/');
            if (parts[0] === 'App') parts.shift();
            return parts[0] || '';
        }

        async function loadReleases() {
            const container = document.getElementById('releasesContainer');
            container.innerHTML = `<div class="text-center py-20 text-slate-400">Loading...</div>`;

            try {
                const res = await fetch('../App/index.json');
                if (!res.ok) throw new Error();
                const files = await res.json();
                allReleases = files.filter(f => typeof f === 'string' && f.endsWith('.yml'));

                const apps = [...new Set(allReleases.map(f => getAppFolder(f)))].sort();
                const appSelect = document.getElementById('appFilter');
                appSelect.innerHTML = '<option value="">All Applications</option>';
                apps.forEach(app => appSelect.innerHTML += `<option value="${app}">${app}</option>`);

                renderReleases(allReleases);
            } catch (e) {
                container.innerHTML = `<div class="text-center py-20 text-red-400">Failed to load index.json</div>`;
            }
        }

        function renderReleases(files) {
            const container = document.getElementById('releasesContainer');
            let html = '';
            files.forEach(fullPath => {
                const fileName = fullPath.split('/').pop();
                const match = fileName.match(/APP_([A-Z]+)_([\d.]+)\.yml/i);
                if (!match) return;
                const app = match[1];
                const version = match[2];

                html += `
                    <div class="card p-6 rounded-xl">
                        <div class="flex justify-between mb-4">
                            <h3 class="text-lg font-bold">${app}</h3>
                            <span class="text-red-400 font-mono">${version}</span>
                        </div>
                        <div class="text-xs text-slate-500 mb-6">${fileName}</div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="viewRelease('${fullPath}')" class="py-2 border border-slate-600 rounded-lg hover:bg-slate-800">View</button>
                            <button onclick="editRelease('${fullPath}')" class="py-2 bg-amber-600 hover:bg-amber-700 rounded-lg">Edit</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || `<div class="text-center py-20 text-slate-400">No releases found</div>`;
        }

        function filterReleases() {
            const term = document.getElementById('search').value.toLowerCase().trim();
            const app = document.getElementById('appFilter').value;
            const filtered = allReleases.filter(f => {
                const matchesApp = !app || getAppFolder(f) === app;
                const matchesSearch = !term || f.toLowerCase().includes(term);
                return matchesApp && matchesSearch;
            });
            renderReleases(filtered);
        }

        function clearFilters() {
            document.getElementById('search').value = '';
            document.getElementById('appFilter').value = '';
            filterReleases();
        }

        async function viewRelease(fullPath) {
            // ... (same as before)
            const modal = document.getElementById('releaseModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            title.textContent = fullPath.split('/').pop();
            content.innerHTML = `<div class="text-center py-12">Loading...</div>`;
            modal.classList.remove('hidden');
            try {
                const clean = fullPath.startsWith('App/') ? fullPath.substring(4) : fullPath;
                const res = await fetch(`../App/${clean}`);
                if (!res.ok) throw new Error();
                const text = await res.text();
                content.innerHTML = `<pre class="text-emerald-400 text-xs whitespace-pre-wrap">${text}</pre>`;
            } catch (e) {
                content.innerHTML = `<div class="text-red-400 text-center">Failed to load file</div>`;
            }
        }

        function closeReleaseModal() {
            document.getElementById('releaseModal').classList.add('hidden');
        }

        // Create & Edit functions (same as previous)
        function showCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        async function editRelease(fullPath) {
            currentEditPath = fullPath;
            try {
                const clean = fullPath.startsWith('App/') ? fullPath.substring(4) : fullPath;
                const res = await fetch(`../App/${clean}`);
                const text = await res.text();
                document.getElementById('editTextarea').value = text;
                document.getElementById('editModal').classList.remove('hidden');
            } catch (e) {
                alert("Failed to load file.");
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            currentEditPath = null;
        }

        function saveEditedYAML() {
            const yaml = document.getElementById('editTextarea').value.trim();
            if (!yaml) return alert("Content cannot be empty");

            document.getElementById('yamlContent').textContent = yaml;
            document.getElementById('githubCreateLink').href = `https://github.com/sugaredcookie/deployement_ui/edit/main/${currentEditPath}`;
            document.getElementById('githubCreateLink').innerHTML = `<i class="fa-solid fa-edit"></i> Update on GitHub`;

            closeEditModal();
            document.getElementById('yamlPreviewModal').classList.remove('hidden');
        }

        function generateAndShowYAML() {
            // (your existing generate function)
            const app = document.getElementById('newApp').value;
            const version = document.getElementById('newVersion').value.trim() || '1.0.0';
            const env = document.getElementById('newEnv').value;
            const changesText = document.getElementById('newChanges').value.trim();
            const changes = changesText ? changesText.split('\n').map(l => `  - ${l.trim()}`).join('\n') : '  - Initial release';

            const yaml = `# Linedata Release Manifest - ${app} v${version}\nrelease:\n  version: "${version}"\n  date: "${new Date().toISOString().split('T')[0]}"\n  environment: "${env}"\n\napplication:\n  name: ${app}\n  client: CLIENT_${app.slice(-1)}\n\nchanges:\n${changes}\n\nmetadata:\n  build_id: "build-${Date.now()}"\n  triggered_by: "releases-dashboard"`;

            document.getElementById('yamlContent').textContent = yaml;
            document.getElementById('githubCreateLink').href = `https://github.com/sugaredcookie/deployement_ui/new/main/App/${app}?filename=${app}_${version}.yml`;
            document.getElementById('githubCreateLink').innerHTML = `<i class="fa-solid fa-github"></i> Create on GitHub`;

            closeCreateModal();
            document.getElementById('yamlPreviewModal').classList.remove('hidden');
        }

        function copyYAML() {
            const text = document.getElementById('yamlContent').textContent;
            navigator.clipboard.writeText(text).then(() => alert("✅ Copied!"));
        }

        function closeYamlPreview() {
            document.getElementById('yamlPreviewModal').classList.add('hidden');
        }

        window.onload = loadReleases;
    </script>
</body>
</html>
