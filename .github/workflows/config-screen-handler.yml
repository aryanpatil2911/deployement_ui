name: "Configuration JSON Handler"

on:
  workflow_dispatch:
    inputs:

      filePath:
        description: "JSON file path inside repository"
        required: true
        type: string

      content:
        description: "Updated JSON content"
        required: true
        type: string

      commitMessage:
        description: "Commit message"
        required: true
        type: string


permissions:
  contents: write
  actions: write


jobs:

  update-json-file:

    name: "Update Configuration JSON"

    runs-on: ubuntu-latest


    steps:

      - name: "Commit JSON Changes"

        uses: actions/github-script@v7

        with:

          github-token: ${{ github.token }}

          script: |

            const path = '${{ inputs.filePath }}';

            const content = Buffer
              .from(`${{ inputs.content }}`)
              .toString('base64');


            let sha = undefined;


            try {

              const existingFile =
                await github.rest.repos.getContent({

                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: path,
                  ref: 'main'

                });


              sha = existingFile.data.sha;


            } catch(error) {

              console.log("Creating new JSON file");

            }


            await github.rest.repos.createOrUpdateFileContents({

              owner: context.repo.owner,

              repo: context.repo.repo,

              path: path,

              message: '${{ inputs.commitMessage }}',

              content: content,

              sha: sha,

              branch: 'main'

            });


            console.log(`Updated: ${path}`);



