name: Update Releases Index

on:
  push:
    paths:
      - 'App/**'
  workflow_dispatch:  # Allows manual trigger for testing

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.json with nested paths
        run: |
          mkdir -p App
          echo "[]" > App/index.json  # fallback

          # Find all .yml files recursively and create proper JSON array
          find App -type f -name "*.yml" | sort | jq -R -s -c 'split("\n")[:-1]' > App/index.json

          echo "Generated App/index.json with $(wc -l < App/index.json) entries"
          cat App/index.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet App/index.json; then
            echo "No changes to index.json"
          else
            git add App/index.json
            git commit -m "chore: update releases index.json [skip ci]"
            git push
            echo "index.json updated and pushed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}